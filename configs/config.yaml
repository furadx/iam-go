# Server Configuration
server:
  mode: release      # debug, release, test
  addr: :8080
  healthz: true
  middlewares: []

# Database Configuration
database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: iam
  sslmode: disable
  max_open_connections: 100
  max_idle_connections: 10
  max_lifetime: 3600  # seconds

# JWT Configuration
jwt:
  secret: change-me-in-production   # 生产环境务必改为强随机密钥
  expire: 86400                     # Token 有效期（秒），默认 24 小时

# Log Configuration
log:
  level: info                    # debug, info, warn, error, fatal
  format: console                # json, console
  enable_color: true
  disable_caller: false
  disable_stacktrace: false
  output_paths:
    - stdout
  error_output_paths:
    - stderr

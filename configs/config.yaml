# Server Configuration
server:
  mode: debug        # debug, release, test —— 本地开发用 debug；生产改 release（release 下必须设置强 jwt.secret）
  addr: :8080
  healthz: true
  middlewares: []

# Database Configuration
database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: iam
  sslmode: disable
  max_open_connections: 100
  max_idle_connections: 10
  max_lifetime: 3600  # seconds

# JWT Configuration
jwt:
  secret: change-me-in-production   # 生产环境务必改为强随机密钥
  access_expire: 900                # access token 有效期（秒），默认 15 分钟
  refresh_expire: 604800            # refresh token 有效期（秒），默认 7 天
  revoke_fail_open: true            # Redis 故障时是否放行（true=保可用，false=保安全）

# Redis Configuration（用于 JWT 吊销）
redis:
  addr: localhost:6379
  password: ""
  db: 0

# Security Configuration
security:
  rate_limit:
    enabled: true
    api_limit: 300
    api_window_seconds: 60
    login_ip_limit: 10
    login_window_seconds: 60
    fail_open: true
  login_lock:
    enabled: true
    user_max_failures: 5
    ip_max_failures: 20
    failure_window_minutes: 15
    lock_minutes: 15
  password_policy:
    min_length: 12
    max_length: 64
    min_classes: 3
    reject_username: true
    reject_common_passwords: true
  cors:
    allowed_origins:
      - http://localhost:3000
      - http://localhost:5173
    allow_credentials: true
    max_age_seconds: 43200

# Log Configuration
log:
  level: info                    # debug, info, warn, error, fatal
  format: console                # json, console
  enable_color: true
  disable_caller: false
  disable_stacktrace: false
  output_paths:
    - stdout
  error_output_paths:
    - stderr
